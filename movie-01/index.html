<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaSceipt</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <div class="flex flex-col">
    <nav class="bg-black text-white p-2">
      <h1 class="text-3xl">Movie Mania</h1>
    </nav>
    <div class="flex justify-around p-8">
      <div class="bg-gray-200 p-4 rounded-lg" id="totalMovie">Total Movies: </div>
      <div class="bg-gray-200 p-4 rounded-lg" id="totalReview">Total Reviews: </div>
      <div class="bg-gray-200 p-4 rounded-lg" id="avgRating">Average Rating: </div>
    </div>
    <div class="flex flex-col justify-around gap-4 px-8" id="movieReview">
      <h2 class="text-2xl font-bold">Movie Reviews</h2>
    </div>
  </div>
</body>
</html>
